<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduPlay - Interactive Learning</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="container flex-center" style="min-height:100vh; gap:32px;">
    <div class="text-center">
      <div class="emoji-big">🎓</div>
      <h1>EduPlay</h1>
      <p class="text-dim" style="margin-top:8px;">Interactive Classroom Learning Platform</p>
    </div>

    <div style="display:flex; gap:16px; flex-wrap:wrap; justify-content:center;">
      <a href="/teacher.html" class="btn btn-primary btn-lg">👩‍🏫 I'm a Teacher</a>
      <a href="/student.html" class="btn btn-accent btn-lg">👨‍🎓 I'm a Student</a>
    </div>
    <a href="/admin.html" class="btn btn-ghost btn-sm">⚙️ Content Manager</a>

    <div class="card text-center" style="max-width:500px;">
      <h3>How it works</h3>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-top:16px; text-align:left;">
        <div><strong>📋 Create</strong><br><span class="text-dim">Teacher creates a live session</span></div>
        <div><strong>🔗 Join</strong><br><span class="text-dim">Students join with a code</span></div>
        <div><strong>🎮 Play</strong><br><span class="text-dim">Quizzes, games & drawing</span></div>
        <div><strong>🏆 Learn</strong><br><span class="text-dim">Real-time leaderboard & review</span></div>
      </div>
    </div>
  </div>
</body>
</html>
