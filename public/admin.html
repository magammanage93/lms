<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Content Manager - EduPlay</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    .tabs { display: flex; gap: 0; margin-bottom: 24px; }
    .tab {
      padding: 12px 24px; cursor: pointer; font-weight: 700; border: none;
      background: var(--surface); color: var(--text-dim); font-size: 1rem;
      transition: all .2s;
    }
    .tab:first-child { border-radius: 10px 0 0 10px; }
    .tab:last-child { border-radius: 0 10px 10px 0; }
    .tab.active { background: var(--primary); color: #fff; }
    .item-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
    .item-row {
      background: var(--surface); border-radius: 10px; padding: 16px;
      display: flex; justify-content: space-between; align-items: center;
      border: 2px solid transparent; transition: border-color .2s; cursor: pointer;
    }
    .item-row:hover { border-color: var(--primary-light); }
    .item-row .meta { display: flex; align-items: center; gap: 12px; }
    .item-row .emoji { font-size: 1.8rem; }
    .item-row .actions { display: flex; gap: 8px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-weight: 700; margin-bottom: 6px; color: var(--text-dim); font-size: .9rem; }
    .form-row { display: flex; gap: 12px; align-items: flex-end; }
    .form-row > * { flex: 1; }
    .question-block {
      background: var(--surface); border-radius: 10px; padding: 16px; margin-bottom: 12px;
      border-left: 4px solid var(--primary);
    }
    .question-block .q-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .question-block .q-num { font-weight: 800; color: var(--primary-light); }
    .options-edit { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .opt-wrap { position: relative; }
    .opt-wrap input { padding-right: 40px; }
    .opt-wrap .correct-mark {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      width: 24px; height: 24px; border-radius: 50%; border: 2px solid var(--text-dim);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: .8rem; transition: all .2s;
    }
    .opt-wrap .correct-mark.active { background: var(--accent); border-color: var(--accent); }
    .pair-block {
      background: var(--surface); border-radius: 10px; padding: 12px 16px;
      display: flex; gap: 12px; align-items: center; margin-bottom: 8px;
    }
    .pair-block input { flex: 1; }
    .card-block {
      background: var(--surface); border-radius: 10px; padding: 16px; margin-bottom: 12px;
      border-left: 4px solid var(--accent);
    }
    .card-block .c-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .card-block .c-num { font-weight: 800; color: var(--accent); }
    .empty-state { text-align: center; padding: 40px; color: var(--text-dim); }
    .emoji-picker { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
    .emoji-opt {
      font-size: 1.5rem; cursor: pointer; padding: 4px 8px; border-radius: 8px;
      border: 2px solid transparent; transition: all .15s;
    }
    .emoji-opt:hover { background: var(--surface); }
    .emoji-opt.active { border-color: var(--primary); background: rgba(124,58,237,.2); }
  </style>
</head>
<body>
  <!-- PIN Gate -->
  <div id="authGate" class="container flex-center" style="min-height:100vh; gap:24px;">
    <div class="emoji-big">🔒</div>
    <h1>Content Manager</h1>
    <p class="text-dim">Enter teacher PIN to access</p>
    <div class="card flex-center gap-md" style="max-width:360px;">
      <input type="password" id="pinInput" style="font-size:1.5rem; text-align:center; letter-spacing:8px;" placeholder="••••" maxlength="20" autocomplete="off"
        onkeydown="if(event.key==='Enter') verifyPin()">
      <button class="btn btn-primary btn-block" onclick="verifyPin()">Enter</button>
      <p id="pinError" style="color:var(--danger); font-weight:600;"></p>
    </div>
    <a href="/" class="btn btn-ghost btn-sm">← Back to Home</a>
  </div>

  <div id="mainContent" class="hidden">
  <div class="navbar">
    <div class="brand">⚙️ Content Manager</div>
    <a href="/" class="btn btn-ghost btn-sm">← Home</a>
  </div>

  <div class="container">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('quizzes')">📝 Quizzes</button>
      <button class="tab" onclick="switchTab('puzzles')">🧩 Drag & Drop</button>
      <button class="tab" onclick="switchTab('flashcards')">🃏 Flashcards</button>
    </div>

    <!-- ═══ QUIZZES TAB ═══ -->
    <div id="tab-quizzes">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
        <h2>Quizzes</h2>
        <button class="btn btn-primary btn-sm" onclick="newQuiz()">+ New Quiz</button>
      </div>
      <div class="item-list" id="quizList"></div>
      <div id="quizEditor" class="hidden">
        <div class="card">
          <h3 id="editorTitle" style="margin-bottom:16px;">Edit Quiz</h3>
          <div class="form-row">
            <div class="form-group">
              <label>Quiz ID (lowercase, no spaces)</label>
              <input type="text" id="quizId" placeholder="e.g. animals">
            </div>
            <div class="form-group">
              <label>Quiz Title</label>
              <input type="text" id="quizTitleInput" placeholder="e.g. Animal Kingdom">
            </div>
          </div>
          <div class="form-group">
            <label>Emoji</label>
            <div class="emoji-picker" id="quizEmojiPicker">
              <span class="emoji-opt" data-e="📝">📝</span><span class="emoji-opt" data-e="🔢">🔢</span><span class="emoji-opt" data-e="🔬">🔬</span>
              <span class="emoji-opt" data-e="📖">📖</span><span class="emoji-opt" data-e="🌍">🌍</span><span class="emoji-opt" data-e="🎵">🎵</span>
              <span class="emoji-opt" data-e="🎨">🎨</span><span class="emoji-opt" data-e="🐾">🐾</span><span class="emoji-opt" data-e="🏛️">🏛️</span>
              <span class="emoji-opt" data-e="💻">💻</span><span class="emoji-opt" data-e="🧮">🧮</span><span class="emoji-opt" data-e="🎯">🎯</span>
            </div>
          </div>
          <div style="display:flex; justify-content:space-between; align-items:center; margin:20px 0 12px;">
            <h3>Questions</h3>
            <button class="btn btn-accent btn-sm" onclick="addQuestion()">+ Add Question</button>
          </div>
          <div id="questionsContainer"></div>
          <div style="display:flex; gap:12px; margin-top:20px;">
            <button class="btn btn-primary" onclick="saveQuiz()">💾 Save Quiz</button>
            <button class="btn btn-ghost" onclick="cancelEdit()">Cancel</button>
          </div>
        </div>
      </div>
    </div>

    <!-- ═══ PUZZLES TAB ═══ -->
    <div id="tab-puzzles" class="hidden">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
        <h2>Drag & Drop Puzzles</h2>
        <button class="btn btn-primary btn-sm" onclick="newPuzzle()">+ New Puzzle</button>
      </div>
      <div class="item-list" id="puzzleList"></div>
      <div id="puzzleEditor" class="hidden">
        <div class="card">
          <h3 id="puzzleEditorTitle" style="margin-bottom:16px;">Edit Puzzle</h3>
          <div class="form-group">
            <label>Puzzle Title</label>
            <input type="text" id="puzzleTitleInput" placeholder="e.g. Animals & Their Sounds">
          </div>
          <div class="form-group">
            <label>Emoji</label>
            <div class="emoji-picker" id="puzzleEmojiPicker">
              <span class="emoji-opt" data-e="🧩">🧩</span><span class="emoji-opt" data-e="🐾">🐾</span><span class="emoji-opt" data-e="🎨">🎨</span>
              <span class="emoji-opt" data-e="🌍">🌍</span><span class="emoji-opt" data-e="🍎">🍎</span><span class="emoji-opt" data-e="🔢">🔢</span>
              <span class="emoji-opt" data-e="🎵">🎵</span><span class="emoji-opt" data-e="🏠">🏠</span><span class="emoji-opt" data-e="⚽">⚽</span><span class="emoji-opt" data-e="🚗">🚗</span>
            </div>
          </div>
          <div style="display:flex; justify-content:space-between; align-items:center; margin:20px 0 12px;">
            <h3>Pairs</h3>
            <button class="btn btn-accent btn-sm" onclick="addPair()">+ Add Pair</button>
          </div>
          <div id="pairsContainer"></div>
          <div style="display:flex; gap:12px; margin-top:20px;">
            <button class="btn btn-primary" onclick="savePuzzle()">💾 Save Puzzle</button>
            <button class="btn btn-ghost" onclick="cancelPuzzleEdit()">Cancel</button>
          </div>
        </div>
      </div>
    </div>

    <!-- ═══ FLASHCARDS TAB ═══ -->
    <div id="tab-flashcards" class="hidden">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
        <h2>Flashcard Decks</h2>
        <button class="btn btn-primary btn-sm" onclick="newDeck()">+ New Deck</button>
      </div>
      <div class="item-list" id="deckList"></div>
      <div id="deckEditor" class="hidden">
        <div class="card">
          <h3 id="deckEditorTitle" style="margin-bottom:16px;">Edit Deck</h3>
          <div class="form-row">
            <div class="form-group">
              <label>Deck ID (lowercase, no spaces)</label>
              <input type="text" id="deckId" placeholder="e.g. animals">
            </div>
            <div class="form-group">
              <label>Deck Title</label>
              <input type="text" id="deckTitleInput" placeholder="e.g. Animal Facts">
            </div>
          </div>
          <div class="form-group">
            <label>Emoji</label>
            <div class="emoji-picker" id="deckEmojiPicker">
              <span class="emoji-opt" data-e="🃏">🃏</span><span class="emoji-opt" data-e="🐾">🐾</span><span class="emoji-opt" data-e="🌍">🌍</span>
              <span class="emoji-opt" data-e="📖">📖</span><span class="emoji-opt" data-e="🔬">🔬</span><span class="emoji-opt" data-e="🎵">🎵</span>
              <span class="emoji-opt" data-e="🧮">🧮</span><span class="emoji-opt" data-e="🏛️">🏛️</span><span class="emoji-opt" data-e="💻">💻</span><span class="emoji-opt" data-e="🎯">🎯</span>
            </div>
          </div>
          <div style="display:flex; justify-content:space-between; align-items:center; margin:20px 0 12px;">
            <h3>Cards</h3>
            <button class="btn btn-accent btn-sm" onclick="addCard()">+ Add Card</button>
          </div>
          <div id="cardsContainer"></div>
          <div style="display:flex; gap:12px; margin-top:20px;">
            <button class="btn btn-primary" onclick="saveDeck()">💾 Save Deck</button>
            <button class="btn btn-ghost" onclick="cancelDeckEdit()">Cancel</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let currentQuizId = null, currentPuzzleIdx = -1, currentDeckId = null;
    let selectedQuizEmoji = '📝', selectedPuzzleEmoji = '🧩', selectedDeckEmoji = '🃏';
    let questionCounter = 0, pairCounter = 0, cardCounter = 0;

    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.getElementById('tab-quizzes').classList.add('hidden');
      document.getElementById('tab-puzzles').classList.add('hidden');
      document.getElementById('tab-flashcards').classList.add('hidden');
      const tabs = document.querySelectorAll('.tab');
      if (tab === 'quizzes') { tabs[0].classList.add('active'); document.getElementById('tab-quizzes').classList.remove('hidden'); }
      else if (tab === 'puzzles') { tabs[1].classList.add('active'); document.getElementById('tab-puzzles').classList.remove('hidden'); }
      else { tabs[2].classList.add('active'); document.getElementById('tab-flashcards').classList.remove('hidden'); }
    }

    function toast(msg, type = 'success') { const t = document.createElement('div'); t.className = `toast toast-${type}`; t.textContent = msg; document.body.appendChild(t); setTimeout(() => t.remove(), 3000); }
    function escHtml(str) { return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    function updateEmojiPicker(pickerId, selected) {
      document.querySelectorAll(`#${pickerId} .emoji-opt`).forEach(el => el.classList.toggle('active', el.dataset.e === selected));
    }

    // ═══ QUIZ ═══
    async function loadQuizList() {
      const res = await fetch('/api/admin/quizzes'); const quizzes = await res.json();
      const list = document.getElementById('quizList');
      if (Object.keys(quizzes).length === 0) { list.innerHTML = '<div class="empty-state">No quizzes yet.</div>'; return; }
      list.innerHTML = Object.entries(quizzes).map(([id, q]) => `
        <div class="item-row" onclick="editQuiz('${id}')">
          <div class="meta"><span class="emoji">${q.emoji || '📝'}</span><div><strong>${q.title}</strong><div class="text-dim" style="font-size:.85rem;">${q.questions.length} questions · ID: ${id}</div></div></div>
          <div class="actions">
            <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation(); editQuiz('${id}')">✏️</button>
            <button class="btn btn-danger btn-sm" onclick="event.stopPropagation(); deleteQuiz('${id}')">🗑</button>
          </div>
        </div>`).join('');
    }

    function newQuiz() {
      currentQuizId = null; document.getElementById('editorTitle').textContent = 'New Quiz';
      document.getElementById('quizId').value = ''; document.getElementById('quizId').disabled = false;
      document.getElementById('quizTitleInput').value = ''; selectedQuizEmoji = '📝';
      updateEmojiPicker('quizEmojiPicker', selectedQuizEmoji);
      document.getElementById('questionsContainer').innerHTML = ''; questionCounter = 0; addQuestion();
      document.getElementById('quizEditor').classList.remove('hidden');
    }

    async function editQuiz(id) {
      const res = await fetch('/api/admin/quizzes'); const quizzes = await res.json(); const quiz = quizzes[id]; if (!quiz) return;
      currentQuizId = id; document.getElementById('editorTitle').textContent = 'Edit Quiz';
      document.getElementById('quizId').value = id; document.getElementById('quizId').disabled = true;
      document.getElementById('quizTitleInput').value = quiz.title; selectedQuizEmoji = quiz.emoji || '📝';
      updateEmojiPicker('quizEmojiPicker', selectedQuizEmoji);
      document.getElementById('questionsContainer').innerHTML = ''; questionCounter = 0;
      quiz.questions.forEach(q => addQuestion(q)); document.getElementById('quizEditor').classList.remove('hidden');
    }

    function addQuestion(data = null) {
      const idx = questionCounter++; const q = data || { q: '', options: ['', '', '', ''], answer: 0, time: 15 };
      const block = document.createElement('div'); block.className = 'question-block'; block.id = `q-block-${idx}`;
      block.innerHTML = `
        <div class="q-header"><span class="q-num">Question ${idx+1}</span>
          <div style="display:flex; gap:8px; align-items:center;"><label style="font-size:.85rem; color:var(--text-dim);">Time:</label>
            <input type="number" class="q-time" value="${q.time}" min="5" max="120" style="width:70px; padding:6px 10px; font-size:.9rem;">
            <button class="btn btn-danger btn-sm" onclick="removeQuestion(${idx})" style="padding:6px 12px;">✕</button></div></div>
        <div class="form-group"><input type="text" class="q-text" placeholder="Enter your question..." value="${escHtml(q.q)}"></div>
        <label style="font-size:.85rem; color:var(--text-dim); margin-bottom:6px; display:block;">Options (click ✓ to mark correct):</label>
        <div class="options-edit">${q.options.map((opt, i) => `<div class="opt-wrap"><input type="text" class="q-opt" data-oidx="${i}" placeholder="Option ${i+1}" value="${escHtml(opt)}">
          <div class="correct-mark ${i === q.answer ? 'active' : ''}" data-oidx="${i}" onclick="markCorrect(${idx}, ${i})">✓</div></div>`).join('')}</div>`;
      document.getElementById('questionsContainer').appendChild(block);
    }
    function removeQuestion(idx) { const el = document.getElementById(`q-block-${idx}`); if (el) el.remove(); }
    function markCorrect(qIdx, optIdx) { const block = document.getElementById(`q-block-${qIdx}`); if (!block) return; block.querySelectorAll('.correct-mark').forEach(m => m.classList.remove('active')); block.querySelector(`.correct-mark[data-oidx="${optIdx}"]`).classList.add('active'); }

    async function saveQuiz() {
      const id = document.getElementById('quizId').value.trim().toLowerCase().replace(/[^a-z0-9_-]/g, '');
      const title = document.getElementById('quizTitleInput').value.trim();
      if (!id) return toast('Quiz ID required', 'error'); if (!title) return toast('Title required', 'error');
      const blocks = document.querySelectorAll('.question-block'); if (blocks.length === 0) return toast('Add a question', 'error');
      const questions = [];
      for (const block of blocks) {
        const q = block.querySelector('.q-text').value.trim(); const time = parseInt(block.querySelector('.q-time').value) || 15;
        const opts = [...block.querySelectorAll('.q-opt')].map(o => o.value.trim());
        const ac = block.querySelector('.correct-mark.active'); const answer = ac ? parseInt(ac.dataset.oidx) : 0;
        if (!q) return toast('All questions need text', 'error'); if (opts.some(o => !o)) return toast('All options needed', 'error');
        questions.push({ q, options: opts, answer, time });
      }
      const res = await fetch(`/api/admin/quizzes/${id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ title, emoji: selectedQuizEmoji, questions }) });
      if (res.ok) { toast('Quiz saved!'); cancelEdit(); loadQuizList(); } else { const err = await res.json(); toast(err.error || 'Save failed', 'error'); }
    }
    async function deleteQuiz(id) { if (!confirm(`Delete quiz "${id}"?`)) return; const res = await fetch(`/api/admin/quizzes/${id}`, { method: 'DELETE' }); if (res.ok) { toast('Deleted'); loadQuizList(); } }
    function cancelEdit() { document.getElementById('quizEditor').classList.add('hidden'); currentQuizId = null; }

    // ═══ PUZZLE ═══
    async function loadPuzzleList() {
      const res = await fetch('/api/admin/puzzles'); const puzzles = await res.json();
      const list = document.getElementById('puzzleList');
      if (puzzles.length === 0) { list.innerHTML = '<div class="empty-state">No puzzles yet.</div>'; return; }
      list.innerHTML = puzzles.map((p, i) => `
        <div class="item-row" onclick="editPuzzle(${i})">
          <div class="meta"><span class="emoji">${p.emoji || '🧩'}</span><div><strong>${p.title}</strong><div class="text-dim" style="font-size:.85rem;">${p.pairs.length} pairs</div></div></div>
          <div class="actions">
            <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation(); editPuzzle(${i})">✏️</button>
            <button class="btn btn-danger btn-sm" onclick="event.stopPropagation(); deletePuzzle(${i})">🗑</button>
          </div>
        </div>`).join('');
    }

    function newPuzzle() {
      currentPuzzleIdx = -1; document.getElementById('puzzleEditorTitle').textContent = 'New Puzzle';
      document.getElementById('puzzleTitleInput').value = ''; selectedPuzzleEmoji = '🧩';
      updateEmojiPicker('puzzleEmojiPicker', selectedPuzzleEmoji);
      document.getElementById('pairsContainer').innerHTML = ''; pairCounter = 0; addPair(); addPair(); addPair();
      document.getElementById('puzzleEditor').classList.remove('hidden');
    }

    async function editPuzzle(idx) {
      const res = await fetch('/api/admin/puzzles'); const puzzles = await res.json(); const puzzle = puzzles[idx]; if (!puzzle) return;
      currentPuzzleIdx = idx; document.getElementById('puzzleEditorTitle').textContent = 'Edit Puzzle';
      document.getElementById('puzzleTitleInput').value = puzzle.title; selectedPuzzleEmoji = puzzle.emoji || '🧩';
      updateEmojiPicker('puzzleEmojiPicker', selectedPuzzleEmoji);
      document.getElementById('pairsContainer').innerHTML = ''; pairCounter = 0;
      puzzle.pairs.forEach(p => addPair(p)); document.getElementById('puzzleEditor').classList.remove('hidden');
    }

    function addPair(data = null) {
      const idx = pairCounter++; const block = document.createElement('div'); block.className = 'pair-block'; block.id = `pair-${idx}`;
      block.innerHTML = `<span style="font-weight:700; color:var(--text-dim); min-width:20px;">${idx+1}</span>
        <input type="text" class="pair-item" placeholder="Drag item" value="${escHtml(data ? data.item : '')}">
        <span style="font-size:1.2rem;">→</span>
        <input type="text" class="pair-target" placeholder="Drop target" value="${escHtml(data ? data.target : '')}">
        <button class="btn btn-danger btn-sm" onclick="removePair(${idx})" style="padding:6px 12px;">✕</button>`;
      document.getElementById('pairsContainer').appendChild(block);
    }
    function removePair(idx) { const el = document.getElementById(`pair-${idx}`); if (el) el.remove(); }

    async function savePuzzle() {
      const title = document.getElementById('puzzleTitleInput').value.trim(); if (!title) return toast('Title required', 'error');
      const blocks = document.querySelectorAll('.pair-block'); if (blocks.length < 2) return toast('Need 2+ pairs', 'error');
      const pairs = [];
      for (const block of blocks) { const item = block.querySelector('.pair-item').value.trim(); const target = block.querySelector('.pair-target').value.trim(); if (!item || !target) return toast('All pairs needed', 'error'); pairs.push({ item, target }); }
      const idx = currentPuzzleIdx >= 0 ? currentPuzzleIdx : 999;
      const res = await fetch(`/api/admin/puzzles/${idx}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ title, emoji: selectedPuzzleEmoji, pairs }) });
      if (res.ok) { toast('Puzzle saved!'); cancelPuzzleEdit(); loadPuzzleList(); } else { const err = await res.json(); toast(err.error || 'Save failed', 'error'); }
    }
    async function deletePuzzle(idx) { if (!confirm('Delete puzzle?')) return; const res = await fetch(`/api/admin/puzzles/${idx}`, { method: 'DELETE' }); if (res.ok) { toast('Deleted'); loadPuzzleList(); } }
    function cancelPuzzleEdit() { document.getElementById('puzzleEditor').classList.add('hidden'); currentPuzzleIdx = -1; }

    // ═══ FLASHCARD DECK ═══
    async function loadDeckList() {
      const res = await fetch('/api/admin/flashcards'); const decks = await res.json();
      const list = document.getElementById('deckList');
      if (Object.keys(decks).length === 0) { list.innerHTML = '<div class="empty-state">No decks yet.</div>'; return; }
      list.innerHTML = Object.entries(decks).map(([id, d]) => `
        <div class="item-row" onclick="editDeck('${id}')">
          <div class="meta"><span class="emoji">${d.emoji || '🃏'}</span><div><strong>${d.title}</strong><div class="text-dim" style="font-size:.85rem;">${d.cards.length} cards · ID: ${id}</div></div></div>
          <div class="actions">
            <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation(); editDeck('${id}')">✏️</button>
            <button class="btn btn-danger btn-sm" onclick="event.stopPropagation(); deleteDeck('${id}')">🗑</button>
          </div>
        </div>`).join('');
    }

    function newDeck() {
      currentDeckId = null; document.getElementById('deckEditorTitle').textContent = 'New Deck';
      document.getElementById('deckId').value = ''; document.getElementById('deckId').disabled = false;
      document.getElementById('deckTitleInput').value = ''; selectedDeckEmoji = '🃏';
      updateEmojiPicker('deckEmojiPicker', selectedDeckEmoji);
      document.getElementById('cardsContainer').innerHTML = ''; cardCounter = 0; addCard(); addCard();
      document.getElementById('deckEditor').classList.remove('hidden');
    }

    async function editDeck(id) {
      const res = await fetch('/api/admin/flashcards'); const decks = await res.json(); const deck = decks[id]; if (!deck) return;
      currentDeckId = id; document.getElementById('deckEditorTitle').textContent = 'Edit Deck';
      document.getElementById('deckId').value = id; document.getElementById('deckId').disabled = true;
      document.getElementById('deckTitleInput').value = deck.title; selectedDeckEmoji = deck.emoji || '🃏';
      updateEmojiPicker('deckEmojiPicker', selectedDeckEmoji);
      document.getElementById('cardsContainer').innerHTML = ''; cardCounter = 0;
      deck.cards.forEach(c => addCard(c)); document.getElementById('deckEditor').classList.remove('hidden');
    }

    function addCard(data = null) {
      const idx = cardCounter++; const block = document.createElement('div'); block.className = 'card-block'; block.id = `card-block-${idx}`;
      block.innerHTML = `
        <div class="c-header"><span class="c-num">Card ${idx+1}</span>
          <button class="btn btn-danger btn-sm" onclick="removeCard(${idx})" style="padding:6px 12px;">✕</button></div>
        <div class="form-group"><label>Front (Question/Term)</label><input type="text" class="card-front" placeholder="e.g. 🐘 Elephant" value="${escHtml(data ? data.front : '')}"></div>
        <div class="form-group"><label>Back (Answer/Definition)</label><input type="text" class="card-back" placeholder="e.g. The largest land animal..." value="${escHtml(data ? data.back : '')}"></div>`;
      document.getElementById('cardsContainer').appendChild(block);
    }
    function removeCard(idx) { const el = document.getElementById(`card-block-${idx}`); if (el) el.remove(); }

    async function saveDeck() {
      const id = document.getElementById('deckId').value.trim().toLowerCase().replace(/[^a-z0-9_-]/g, '');
      const title = document.getElementById('deckTitleInput').value.trim();
      if (!id) return toast('Deck ID required', 'error'); if (!title) return toast('Title required', 'error');
      const blocks = document.querySelectorAll('.card-block'); if (blocks.length < 2) return toast('Need 2+ cards', 'error');
      const cards = [];
      for (const block of blocks) { const front = block.querySelector('.card-front').value.trim(); const back = block.querySelector('.card-back').value.trim(); if (!front || !back) return toast('All cards need front and back', 'error'); cards.push({ front, back }); }
      const res = await fetch(`/api/admin/flashcards/${id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ title, emoji: selectedDeckEmoji, cards }) });
      if (res.ok) { toast('Deck saved!'); cancelDeckEdit(); loadDeckList(); } else { const err = await res.json(); toast(err.error || 'Save failed', 'error'); }
    }
    async function deleteDeck(id) { if (!confirm(`Delete deck "${id}"?`)) return; const res = await fetch(`/api/admin/flashcards/${id}`, { method: 'DELETE' }); if (res.ok) { toast('Deleted'); loadDeckList(); } }
    function cancelDeckEdit() { document.getElementById('deckEditor').classList.add('hidden'); currentDeckId = null; }

    // ═══ EMOJI PICKERS ═══
    document.querySelectorAll('#quizEmojiPicker .emoji-opt').forEach(el => el.addEventListener('click', () => { selectedQuizEmoji = el.dataset.e; updateEmojiPicker('quizEmojiPicker', selectedQuizEmoji); }));
    document.querySelectorAll('#puzzleEmojiPicker .emoji-opt').forEach(el => el.addEventListener('click', () => { selectedPuzzleEmoji = el.dataset.e; updateEmojiPicker('puzzleEmojiPicker', selectedPuzzleEmoji); }));
    document.querySelectorAll('#deckEmojiPicker .emoji-opt').forEach(el => el.addEventListener('click', () => { selectedDeckEmoji = el.dataset.e; updateEmojiPicker('deckEmojiPicker', selectedDeckEmoji); }));

    // ═══ AUTH ═══
    async function verifyPin() {
      const pin = document.getElementById('pinInput').value;
      const err = document.getElementById('pinError');
      if (!pin) { err.textContent = 'Enter a PIN'; return; }
      const res = await fetch('/api/auth/teacher', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ pin }) });
      if (res.ok) { sessionStorage.setItem('teacher_auth', 'true'); initApp(); }
      else { err.textContent = 'Wrong PIN. Try again.'; document.getElementById('pinInput').value = ''; }
    }

    function initApp() {
      document.getElementById('authGate').classList.add('hidden');
      document.getElementById('mainContent').classList.remove('hidden');
      loadQuizList(); loadPuzzleList(); loadDeckList();
    }

    if (sessionStorage.getItem('teacher_auth') === 'true') initApp();
  </script>
</div>
</body>
</html>
