<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drawing Student - සෙල්ලම් පාසල</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <!-- Join -->
  <div id="screen-join" class="container flex-center" style="min-height:100vh; gap:24px;">
    <div class="text-center">
      <div class="emoji-big">🎨</div>
      <h1>Join Drawing</h1>
      <p class="text-dim">Enter the code from your teacher</p>
    </div>
    <div class="card flex-center gap-md" style="max-width:400px;">
      <input type="text" id="codeInput" class="code-input" placeholder="ABC123" maxlength="6" autocomplete="off">
      <input type="text" id="nickInput" placeholder="Your Nickname" maxlength="20" autocomplete="off">
      <button class="btn btn-accent btn-block" onclick="joinSession()">Join! 🚀</button>
      <p id="joinError" class="text-dim" style="color:var(--danger);"></p>
    </div>
    <a href="/" class="btn btn-ghost btn-sm">← Back to Home</a>
  </div>

  <!-- Waiting -->
  <div id="screen-waiting" class="container flex-center hidden" style="min-height:80vh; gap:24px;">
    <div class="text-center">
      <div class="emoji-big">⏳</div>
      <h2>You're in!</h2>
      <p>Hi <strong id="displayNick"></strong>!</p>
      <p class="text-dim">Waiting for teacher to start the activity...</p>
    </div>
  </div>

  <!-- Drawing Canvas -->
  <div id="screen-game" class="hidden">
    <div class="navbar">
      <div class="brand">🎨 Drawing Canvas</div>
      <button class="btn btn-accent btn-sm" onclick="submitDrawing()">Submit ✅</button>
    </div>
    <div class="container">
      <div class="draw-toolbar" id="toolbar">
        <span class="text-dim" style="font-weight:700; margin-right:8px;">Colors:</span>
        <button class="color-btn active" style="background:#000000;" data-color="#000000" onclick="setColor(this)"></button>
        <button class="color-btn" style="background:#e53e3e;" data-color="#e53e3e" onclick="setColor(this)"></button>
        <button class="color-btn" style="background:#3182ce;" data-color="#3182ce" onclick="setColor(this)"></button>
        <button class="color-btn" style="background:#38a169;" data-color="#38a169" onclick="setColor(this)"></button>
        <button class="color-btn" style="background:#d69e2e;" data-color="#d69e2e" onclick="setColor(this)"></button>
        <button class="color-btn" style="background:#9f7aea;" data-color="#9f7aea" onclick="setColor(this)"></button>
        <button class="color-btn" style="background:#ed64a6;" data-color="#ed64a6" onclick="setColor(this)"></button>
        <button class="color-btn" style="background:#ffffff; border:2px solid #ccc;" data-color="#ffffff" onclick="setColor(this)"></button>

        <span class="text-dim" style="font-weight:700; margin:0 8px 0 16px;">Size:</span>
        <button class="size-btn" data-size="3" onclick="setSize(this)">S</button>
        <button class="size-btn active" data-size="6" onclick="setSize(this)">M</button>
        <button class="size-btn" data-size="12" onclick="setSize(this)">L</button>
        <button class="size-btn" data-size="24" onclick="setSize(this)">XL</button>

        <button class="btn btn-danger btn-sm" style="margin-left:auto;" onclick="clearCanvas()">🗑 Clear</button>
      </div>
      <div style="text-align:center;">
        <canvas id="drawCanvas" class="draw-canvas" width="800" height="500"></canvas>
      </div>
      <div id="submitted" class="hidden" style="margin-top:16px;">
        <div class="card text-center">
          <div style="font-size:3rem;">✅</div>
          <h3>Response Submitted!</h3>
          <p class="text-dim" style="margin-top:6px;">You can keep drawing or wait for the next activity.</p>
        </div>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const TYPE = 'draw';
    let socket, sessionCode, nickname;

    function show(id) { document.querySelectorAll('[id^="screen-"]').forEach(el => el.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); }
    function toast(msg, type = 'success') { const t = document.createElement('div'); t.className = `toast toast-${type}`; t.textContent = msg; document.body.appendChild(t); setTimeout(() => t.remove(), 3000); }

    document.getElementById('codeInput').addEventListener('input', function () { this.value = this.value.toUpperCase().replace(/[^A-Z0-9]/g, ''); });

    function joinSession() {
      const code = document.getElementById('codeInput').value.trim().toUpperCase();
      const nick = document.getElementById('nickInput').value.trim();
      const err = document.getElementById('joinError');
      if (code.length !== 6) { err.textContent = 'Code must be 6 characters'; return; }
      if (!nick || nick.length < 2) { err.textContent = 'Enter a nickname (2+ chars)'; return; }
      err.textContent = '';
      sessionCode = code; nickname = nick;
      socket = io();
      socket.emit('student-join', { type: TYPE, code: sessionCode, nickname });
      socket.on('join-success', ({ state }) => {
        document.getElementById('displayNick').textContent = nickname;
        if (state === 'activity') initCanvas(); else show('screen-waiting');
      });
      socket.on('error-msg', msg => { err.textContent = msg; });
      socket.on('activity-started', () => initCanvas());
      socket.on('activity-ended', () => { show('screen-waiting'); toast('Activity ended by teacher'); });
      socket.on('back-to-lobby', () => show('screen-waiting'));
      socket.on('session-ended', () => { socket.disconnect(); show('screen-join'); toast('Session ended', 'error'); });
    }

    // Canvas setup
    const canvas = document.getElementById('drawCanvas');
    const ctx = canvas.getContext('2d');
    let drawing = false, currentColor = '#000000', currentSize = 6, lastX = 0, lastY = 0;

    function initCanvas() {
      show('screen-game');
      document.getElementById('submitted').classList.add('hidden');
      resizeCanvas();
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    }

    function resizeCanvas() {
      const container = canvas.parentElement;
      const maxW = Math.min(800, container.clientWidth - 20);
      canvas.style.width = maxW + 'px';
      canvas.style.height = (maxW * 0.625) + 'px';
    }
    window.addEventListener('resize', resizeCanvas);

    ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';

    function getPos(e) {
      const rect = canvas.getBoundingClientRect();
      const sx = canvas.width / rect.width, sy = canvas.height / rect.height;
      if (e.touches) return { x: (e.touches[0].clientX - rect.left) * sx, y: (e.touches[0].clientY - rect.top) * sy };
      return { x: (e.clientX - rect.left) * sx, y: (e.clientY - rect.top) * sy };
    }
    function startDraw(e) { e.preventDefault(); drawing = true; const pos = getPos(e); lastX = pos.x; lastY = pos.y; }
    function draw(e) { if (!drawing) return; e.preventDefault(); const pos = getPos(e); ctx.strokeStyle = currentColor; ctx.lineWidth = currentSize; ctx.beginPath(); ctx.moveTo(lastX, lastY); ctx.lineTo(pos.x, pos.y); ctx.stroke(); lastX = pos.x; lastY = pos.y; }
    function stopDraw(e) { if (e) e.preventDefault(); drawing = false; }

    canvas.addEventListener('mousedown', startDraw);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', stopDraw);
    canvas.addEventListener('mouseleave', stopDraw);
    canvas.addEventListener('touchstart', startDraw, { passive: false });
    canvas.addEventListener('touchmove', draw, { passive: false });
    canvas.addEventListener('touchend', stopDraw);
    canvas.addEventListener('touchcancel', stopDraw);

    function setColor(btn) { currentColor = btn.getAttribute('data-color'); document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); }
    function setSize(btn) { currentSize = parseInt(btn.getAttribute('data-size')); document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); }
    function clearCanvas() { ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, canvas.width, canvas.height); }

    function submitDrawing() {
      const dataURL = canvas.toDataURL('image/png');
      socket.emit('submit-activity', { type: TYPE, code: sessionCode, activityType: 'draw', data: dataURL });
      document.getElementById('submitted').classList.remove('hidden');
    }

    (function autoRejoin() {
      const p = new URLSearchParams(window.location.search);
      const code = p.get('code'), nick = p.get('nick');
      if (code && nick) { document.getElementById('codeInput').value = code; document.getElementById('nickInput').value = nick; history.replaceState(null, '', '/draw/student.html'); joinSession(); }
    })();
  </script>
</body>
</html>
